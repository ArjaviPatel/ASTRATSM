# AstraTSM nginx site config.
# Install: copy to /etc/nginx/sites-available/astratsm, symlink into
# sites-enabled, then `nginx -t && systemctl reload nginx`.
#
# Serves the built React frontend as static files and proxies the API,
# Django admin, media, and static to the Gunicorn UNIX socket.

upstream astratsm_app {
    server unix:/run/astratsm/gunicorn.sock;
}

# Redirect all HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;
    # Allow ACME/Certbot challenges before redirecting.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # TLS — issued by certbot (see DEPLOYMENT.md).
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    client_max_body_size 12m;   # matches DATA_UPLOAD_MAX_MEMORY_SIZE (10m) + headroom

    # ── Frontend (React build output) ──────────────────────────────────────
    root /opt/astratsm/frontend/dist;
    index index.html;

    # ── Django collected static files ──────────────────────────────────────
    location /static/ {
        alias /opt/astratsm/backend/staticfiles/;
        expires 30d;
        access_log off;
    }

    # ── User-uploaded media ────────────────────────────────────────────────
    location /media/ {
        alias /opt/astratsm/backend/media/;
        expires 7d;
    }

    # ── API + Django admin → Gunicorn ──────────────────────────────────────
    location ~ ^/(api|admin)/ {
        proxy_pass http://astratsm_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 60s;
    }

    # ── WebSockets → Daphne (OPTIONAL; only if astratsm-daphne is running) ──
    location /ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # ── SPA fallback — every other path serves index.html ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
